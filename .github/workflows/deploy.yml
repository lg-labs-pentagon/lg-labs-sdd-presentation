name: Build & Deploy to Firebase Hosting

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Build Marp HTMLs
        run: |
          mkdir -p public/es public/en
          for lang in es en; do
            for theme in default gaia uncover; do
              echo "Rendering $lang/$theme..."
              npx -y @marp-team/marp-cli@latest \
                "$lang/slides.$theme.md" \
                --html \
                --output "public/$lang/$theme.html"
            done
          done

      - name: Deploy preview (PRs)
        # Skip preview when secrets aren't available (e.g. PRs from forks or Dependabot).
        # Without the service account this step would always fail.
        if: github.event_name == 'pull_request' && env.HAS_FIREBASE_SECRET == 'true'
        env:
          HAS_FIREBASE_SECRET: ${{ secrets.FIREBASE_SERVICE_ACCOUNT != '' }}
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          projectId: ${{ vars.FIREBASE_PROJECT_ID }}
          expires: 7d

      - name: Deploy to live channel (main)
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          projectId: ${{ vars.FIREBASE_PROJECT_ID }}
          channelId: live
